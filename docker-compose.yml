version: '3.8'

services:

  postgres:
    image: postgres
    container_name: postgres-container
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - food-app-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - food-app-network
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8080"
    depends_on:
      - postgres
    networks:
      - food-app-network

networks:
  food-app-network: