server:
  port: 8085

spring:
  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://localhost:8080
          predicates:
            - Path=/auth/**, /user/**

        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/orders/**

        - id: restaurant-service
          uri: http://localhost:8083
          predicates:
            - Path=/restaurants/**